<section class="contact">

<h1>Contact Me</h1>

<form>

<label for="name">
Name
</label>

<input
type="text"
id="name"
name="name"
placeholder="Enter your name"
required>

<label for="email">
Email
</label>

<input
type="email"
id="email"
name="email"
placeholder="Enter your email"
required>

<label for="message">
Message
</label>

<textarea
id="message"
name="message"
rows="6"
placeholder="Enter your message"
required>
</textarea>

<button
type="submit"
aria-label="Submit Contact Form">

Send Message

</button>

</form>
